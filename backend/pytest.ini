[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    spine: Spine data verification tests (reads live Supabase, use sparingly)
    integration: Full endpoint tests with mocked dependencies
    rls: Row Level Security cross-firm isolation tests
    slow: Tests taking > 5s
