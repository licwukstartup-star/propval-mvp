# Pre-commit hooks for PropVal MVP
# Install: py -3.11 -m pip install pre-commit
# Activate: py -3.11 -m pre_commit install
# Manual run: py -3.11 -m pre_commit run --all-files

repos:
  # --- Standard hygiene hooks ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/  # Next.js has its own JSON handling

  # --- Secret detection ---
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock\.json|\.next/

  # --- Python linting (ruff — fast, modern) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        args: [--check]
        files: ^backend/
